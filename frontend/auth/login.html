<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Planner Login</title>

<link rel="stylesheet" href="../assets/style.css">

</head>

<body>

<div class="container">

    <div class="left">

        <h1>Study Planner</h1>

        <p>Login to manage your tasks efficiently</p>

        <form action="../../backend/auth/login.php" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="links">

            <a href="register.html">
                Create Account
            </a>

            <br><br>

            <a href="forgot-password.html">
                Forgot Password?
            </a>

        </div>

    </div>

    <div class="right">

        <div class="profile">
            👤
        </div>

        <h2>Welcome Back</h2>

        <p>Organize • Track • Succeed</p>

    </div>

</div>

</body>
</html>
