<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet" href="../assets/style.css">

</head>

<body>

<div class="form-container">

    <h1>Create Account</h1>

    <p class="subtitle">
        Join Study Planner today
    </p>

        <form action="../../backend/auth/register.php" method="POST">

        <input
            type="text"
            name="full_name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <div class="terms">
            By creating an account, you agree to use this system for academic purposes only.
        </div>

        <div class="checkbox">

            <input type="checkbox" required>

            <label>
                I agree to Terms & Conditions
            </label>

        </div>

        <button type="submit">
            Create Account
        </button>

    </form>

    <div class="link">

        <a href="login.html">
            Already have an account? Login
        </a>

    </div>

</div>

</body>
</html>
