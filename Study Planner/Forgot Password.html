<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#add8e6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.container{
width:650px;
background:white;
border-radius:20px;
padding:45px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
font-size:36px;
color:#add8e6;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#add8e6;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#97cfe0;
}

.message{
margin-top:15px;
font-size:14px;
color:green;
text-align:center;
}

.link{
margin-top:15px;
text-align:center;
}

.link a{
color:#add8e6;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Forgot Password</h1>

<p class="subtitle">
Enter your email and a recovery link will be sent to your Gmail.
</p>

<input type="email"
id="email"
placeholder="Enter your email"
required>

<button onclick="sendResetEmail()">
Send Recovery Link
</button>

<div class="message" id="msg"></div>

<div class="link">
<a href="Study Planner.html">Back to Login</a>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyB4Koh_YG9mRNvny8Dzrk9T7Ju4dtvKpUk",
authDomain: "study-planner-and-task-manage.firebaseapp.com",
projectId: "study-planner-and-task-manage",
storageBucket: "study-planner-and-task-manage.firebasestorage.app",
messagingSenderId: "73955881288",
appId: "1:73955881288:web:a46c4277a1fddd9fbd837d",
measurementId: "G-5RRZBGR9PG"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.sendResetEmail = function(){

let email =
document.getElementById("email").value;

if(email===""){
alert("Please enter your email");
return;
}

sendPasswordResetEmail(auth,email)

.then(()=>{

document.getElementById("msg").innerHTML=
"Recovery link sent successfully. Check your Gmail inbox.";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
