<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#add8e6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.container{
width:650px;
background:#fff;
border-radius:20px;
padding:45px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
font-size:38px;
color:#add8e6;
margin-bottom:10px;
}

.subtitle{
margin-bottom:25px;
color:#666;
font-size:16px;
}

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#add8e6;
color:white;
font-size:17px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#97cfe0;
}

.terms{
font-size:13px;
color:#666;
line-height:1.6;
margin:15px 0;
}

.checkbox{
display:flex;
align-items:center;
gap:8px;
margin-bottom:20px;
font-size:14px;
}

.checkbox input{
width:16px;
height:16px;
}

.link{
margin-top:18px;
text-align:center;
}

.link a{
color:#add8e6;
text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

<h1>Create Account</h1>
<p class="subtitle">Join Study Planner today</p>

<input type="text" id="fullname" placeholder="Full Name">
<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">

<select>
<option>Student</option>
</select>

<div class="terms">
By creating an account, you agree to use this system for academic purposes only. Your information is securely stored and protected.
</div>

<div class="checkbox">
<input type="checkbox" required>
<label>I agree to Terms & Conditions</label>
</div>

<button onclick="register()">Create Account</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4Koh_YG9mRNvny8Dzrk9T7Ju4dtvKpUk",
  authDomain: "study-planner-and-task-manage.firebaseapp.com",
  projectId: "study-planner-and-task-manage",
  storageBucket: "study-planner-and-task-manage.firebasestorage.app",
  messagingSenderId: "73955881288",
  appId: "1:73955881288:web:a46c4277a1fddd9fbd837d",
  measurementId: "G-5RRZBGR9PG"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.register = function(){

let fullname = document.getElementById("fullname").value;

let email = document.getElementById("email").value;

let password = document.getElementById("password").value;

let confirm = document.getElementById("confirm").value;

if(fullname === "" || email === "" || password === "" || confirm === ""){

alert("Please fill in all fields");

return;

}

if(password !== confirm){

alert("Passwords do not match");

return;

}

let pattern = /^(?=.*[A-Z])(?=.*\d).{8,}$/;

if(!pattern.test(password)){

alert("Password must contain 8 characters, 1 uppercase letter, and 1 number");

return;

}

createUserWithEmailAndPassword(auth, email, password)

.then((userCredential) => {

alert("Account Created Successfully");

window.location.href = "Study Planner.html";

})

.catch((error) => {

alert(error.message);

});

}

</script>

<div class="link">
<a href="Study Planner.html">Already have account? Login</a>
</div>

</div>

</body>
</html>
