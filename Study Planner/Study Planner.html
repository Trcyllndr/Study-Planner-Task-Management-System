<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner Login</title>
<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
transition:0.3s;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#add8e6;
padding:20px;
}

.container{
width:950px;
min-height:520px;
background:white;
border-radius:20px;
overflow:hidden;
display:flex;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.left{
width:50%;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:45px;
color:#add8e6;
margin-bottom:10px;
}

.left p{
color:#555;
margin-bottom:30px;
line-height:1.5;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
outline:none;
}

input:focus{
border-color:#add8e6;
box-shadow:0 0 5px rgba(173,216,230,0.5);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#add8e6;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#95cada;
}

.links{
margin-top:20px;
text-align:center;
}

.links a{
text-decoration:none;
color:#add8e6;
font-size:14px;
}

.links a:hover{
text-decoration:underline;
}

.right{
width:50%;
background:#1f1f1f;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
}

.profile{
width:200px;
height:200px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:90px;
}

.right h2{
margin-top:20px;
font-size:35px;
}

.right p{
margin-top:10px;
color:#bbb;
}

@media(max-width:850px){

.container{
flex-direction:column;
width:100%;
}

.left,
.right{
width:100%;
}

.right{
padding:50px 20px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>Study Planner</h1>

<p>Login to manage your tasks efficiently</p>

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="links">

<a href="create.html">
Create Account
</a>

<br><br>

<a href="forgot.html">
Forgot Password?
</a>

</div>

</div>

<div class="right">

<div class="profile">
👤
</div>

<h2>Welcome Back</h2>

<p>Organize • Track • Succeed</p>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyB4Koh_YG9mRNvny8Dzrk9T7Ju4dtvKpUk",

authDomain: "study-planner-and-task-manage.firebaseapp.com",

projectId: "study-planner-and-task-manage",

storageBucket: "study-planner-and-task-manage.firebasestorage.app",

messagingSenderId: "73955881288",

appId: "1:73955881288:web:a46c4277a1fddd9fbd837d"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = function(){

let email = document.getElementById("email").value.trim();

let password = document.getElementById("password").value;

if(email === "" || password === ""){

alert("Please fill in all fields");
return;

}

signInWithEmailAndPassword(auth,email,password)

.then(() => {

localStorage.setItem("loggedIn","true");

localStorage.setItem("email",email);

alert("Login Successful");

window.location.href = "welcome.html";

})

.catch((error) => {

console.log(error);

alert("Wrong email or password");

});

}

document.addEventListener("keypress", function(event){

if(event.key === "Enter"){

login();

}

});

</script>

</body>
</html>
